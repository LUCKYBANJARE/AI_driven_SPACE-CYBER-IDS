            ${data.analytics.collision_history.slice(-1)[0] || 0}

        </div>

        <div class="metric">

            Congestion :
            ${data.analytics.congestion_history.slice(-1)[0] || 0}

        </div>

        <div class="metric">

            Cyber Severity :
            ${data.analytics.cyber_history.slice(-1)[0] || 0}

        </div>

        <div class="metric info">

            Active Satellites :
            ${data.satellites.length}

        </div>

    `;

    // =================================================
    // PIPELINE
    // =================================================

    updatePipeline(data);
};

// =====================================================
// SOCKET EVENTS
// =====================================================

socket.onopen = () => {

    console.log("WebSocket Connected");
};

socket.onerror = (err) => {

    console.log("Socket Error",err);
};

socket.onclose = () => {

    console.log("Socket Closed");
};
