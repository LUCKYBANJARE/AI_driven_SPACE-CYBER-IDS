<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Satellite Orbit Simulation
  </title>

  <!-- USE EXISTING CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div id="info">
  Advanced Satellite Orbit Simulation
</div>

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- ORBIT CONTROLS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<!-- USE EXISTING EARTH FILE -->
<script src="index.js"></script>

<script>

/* =====================================
   ADDITIONAL SATELLITE SYSTEM
===================================== */

const extraOrbitSystems = [];


/* =====================================
   REALISTIC SATELLITE DESIGN
===================================== */

function createAdvancedSatellite(){

  const satellite = new THREE.Group();


  /* MAIN BODY */

  const body = new THREE.Mesh(

    new THREE.BoxGeometry(
      2,
      1.4,
      1.4
    ),

    new THREE.MeshStandardMaterial({
      color:0xc0c0c0,
      metalness:1,
      roughness:0.25
    })
  );

  body.castShadow = true;

  satellite.add(body);


  /* GOLD FOIL */

  for(let i=0;i<10;i++){

    const foil = new THREE.Mesh(

      new THREE.BoxGeometry(
        2.05,
        0.03,
        1.45
      ),

      new THREE.MeshStandardMaterial({
        color:0xd4af37,
        metalness:1,
        roughness:0.35
      })
    );

    foil.position.y = -0.5 + i*0.1;

    satellite.add(foil);
  }


  /* SOLAR PANELS */

  function createPanel(x){

    const group = new THREE.Group();

    const panel = new THREE.Mesh(

      new THREE.BoxGeometry(
        5,
        0.08,
        2
      ),

      new THREE.MeshStandardMaterial({
        color:0x003cff,
        emissive:0x001133,
        metalness:0.7,
        roughness:0.2
      })
    );

    group.add(panel);


    /* PANEL LINES */

    for(let i=-2.2;i<=2.2;i+=0.4){

      const line = new THREE.Mesh(

        new THREE.BoxGeometry(
          0.02,
          0.1,
          2.1
        ),

        new THREE.MeshBasicMaterial({
          color:0x111111
        })
      );

      line.position.x = i;

      group.add(line);
    }

    group.position.x = x;

    return group;
  }

  satellite.add(createPanel(-4));

  satellite.add(createPanel(4));


  /* CONNECTOR ARMS */

  const armMaterial =
    new THREE.MeshStandardMaterial({

      color:0x888888,
      metalness:1,
      roughness:0.3
    });

  const leftArm = new THREE.Mesh(

    new THREE.CylinderGeometry(
      0.08,
      0.08,
      2
    ),

    armMaterial
  );

  leftArm.rotation.z = Math.PI/2;

  leftArm.position.x = -2;

  satellite.add(leftArm);


  const rightArm = new THREE.Mesh(

    new THREE.CylinderGeometry(
      0.08,
      0.08,
      2
    ),

    armMaterial
  );

  rightArm.rotation.z = Math.PI/2;

  rightArm.position.x = 2;

  satellite.add(rightArm);


  /* DISH */

  const dish = new THREE.Mesh(

    new THREE.CylinderGeometry(
      0.8,
      0.1,
      0.5,
      32,
      1,
      true
    ),

    new THREE.MeshStandardMaterial({
      color:0xe0e0e0,
      metalness:1,
      roughness:0.2,
      side:THREE.DoubleSide
    })
  );

  dish.rotation.x = Math.PI/2;

  dish.position.z = 1.3;

  satellite.add(dish);


  /* ANTENNA */

  const antenna = new THREE.Mesh(

    new THREE.CylinderGeometry(
      0.04,
      0.04,
      2.5
    ),

    new THREE.MeshStandardMaterial({
      color:0xffffff,
      metalness:1
    })
  );

  antenna.position.y = 1.7;

  satellite.add(antenna);


  /* THRUSTERS */

  for(let i=-0.6;i<=0.6;i+=1.2){

    const thruster = new THREE.Mesh(

      new THREE.CylinderGeometry(
        0.16,
        0.24,
        0.5,
        32
      ),

      new THREE.MeshStandardMaterial({
        color:0x444444,
        metalness:1
      })
    );

    thruster.rotation.x = Math.PI/2;

    thruster.position.set(
      i,
      -0.6,
      -1
    );

    satellite.add(thruster);
  }


  /* ENGINE GLOW */

  const engineGlow = new THREE.PointLight(
    0x00aaff,
    2,
    8
  );

  engineGlow.position.z = -1.8;

  satellite.add(engineGlow);


  return satellite;
}


/* =====================================
   CREATE EXTRA SATELLITES
===================================== */

for(let i=0;i<20;i++){

  const orbitGroup = new THREE.Group();

  scene.add(orbitGroup);


  const satellite =
    createAdvancedSatellite();

  const distance =
    140 + Math.random()*180;

  satellite.position.x = distance;

  satellite.scale.setScalar(
     1.2 + Math.random()*0.6
  );

  orbitGroup.rotation.x =
    Math.random()*Math.PI;

  orbitGroup.rotation.y =
    Math.random()*Math.PI;

  orbitGroup.rotation.z =
    Math.random()*Math.PI;

  orbitGroup.add(satellite);


  /* ORBIT PATH */

  const orbitGeometry =
    new THREE.RingGeometry(
      distance - 0.2,
      distance + 0.2,
      128
    );

  const orbitMaterial =
    new THREE.MeshBasicMaterial({

      color:0x666666,
      side:THREE.DoubleSide,
      transparent:true,
      opacity:0.25
    });

  const orbitRing =
    new THREE.Mesh(
      orbitGeometry,
      orbitMaterial
    );

  orbitRing.rotation.x = Math.PI/2;

  orbitGroup.add(orbitRing);


  extraOrbitSystems.push({

    orbitGroup,
    satellite,

    speed:
      0.0008 + Math.random()*0.003,

    rotationSpeed:
      0.01 + Math.random()*0.02
  });
}


/* =====================================
   ADDITIONAL ANIMATION LOOP
===================================== */

function animateSatellites(){

  requestAnimationFrame(
    animateSatellites
  );

  extraOrbitSystems.forEach((obj)=>{

    obj.orbitGroup.rotation.y +=
      obj.speed;

    obj.satellite.rotation.y +=
      obj.rotationSpeed;
  });
}

animateSatellites();

</script>

</body>
</html>
